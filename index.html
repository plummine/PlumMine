<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlumMine - 🧺 Official</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://pl28882912.effectivegatecpm.com/54/da/79/54da79f3dc63fac794c2e5433a1f8679.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #2e7d32; --accent: #8d6e63; --bkash: #e91e63; --binance: #f3ba2f; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e3f2fd; margin: 0; padding: 0; user-select: none; overflow: hidden; }
        .page { display: none; padding: 10px 15px 120px; height: 100vh; box-sizing: border-box; text-align: center; overflow-y: auto; }
        .active { display: block; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; }
        #u-pic { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--primary); background: #eee; }
        
        .bal-card { background: #fff9c4; border: 3px solid var(--accent); border-radius: 20px; padding: 20px; position: relative; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .bal-card h1 { font-size: 45px; margin: 5px 0; color: #d84315; }
        .basket-img { position: absolute; right: 10px; top: 10px; width: 80px; animation: bounce 2s infinite; }
        
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        /* Gift Box Styles */
        .gift-box-btn { background: linear-gradient(45deg, #ff9800, #f44336); border: none; padding: 15px; border-radius: 15px; width: 100%; color: white; font-weight: bold; font-size: 16px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(244, 67, 54, 0.3); animation: pulse 1.5s infinite; cursor: pointer; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .prog-bg { width: 100%; background: #eee; height: 12px; border-radius: 10px; overflow: hidden; margin-top: 10px; border: 1px solid #ddd; }
        #prog-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4caf50, #2e7d32); transition: 0.3s; }
        
        .tree-zone { height: 35vh; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #tree-img { width: 80%; max-width: 250px; transition: 0.1s; }
        #tree-img:active { transform: scale(0.9); }
        
        .btn { border: none; padding: 12px 20px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--primary); }
        .btn-done { background: #aaa !important; cursor: not-allowed; } /* কমপ্লিট হওয়ার পর গ্রে কালার */

        .btn-bkash { background: linear-gradient(45deg, #d81b60, #e91e63); }
        .btn-binance { background: linear-gradient(45deg, #f3ba2f, #f1b000); color: #000; }
        .btn-grad-blue { background: linear-gradient(45deg, #1976d2, #0288d1); width: 110px; }

        input, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { text-align: center; font-size: 11px; color: #888; flex: 1; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item img { width: 24px; display: block; margin: 0 auto 5px; }

        .f-join { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #e3f2fd; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
    </style>
</head>
<body style="display:none">

    <div id="f-join" class="f-join">
        <img src="https://i.ibb.co.com/TDnYXwG1/27118-removebg-preview.png" width="100">
        <h2>মেম্বারশিপ চেক!</h2>
        <p>গেমটি খেলতে আমাদের চ্যানেলে জয়েন করুন।</p>
        <button class="btn btn-primary" style="width:100%" onclick="window.open('https://t.me/HasiEarnigZone')">Join Channel</button>
        <button class="btn" style="width:100%; margin-top:10px; background:#aaa" onclick="location.reload()">জয়েন করেছি</button>
    </div>

    <div id="home" class="page active">
        <div class="header">
            <span style="font-weight:bold; font-size:20px; color:var(--primary)">🧺 PlumMine</span>
            <img id="u-pic" src="">
        </div>
        
        <div class="bal-card">
            <small>TOTAL CHERRIES</small>
            <h1 id="bal">0</h1>
            <img class="basket-img" src="https://i.ibb.co.com/TDnYXwG1/27118-removebg-preview.png">
            <div style="font-size:12px; font-weight:bold">Ad Progress: <span id="tap-count">0</span>/50</div>
            <div class="prog-bg"><div id="prog-fill"></div></div>
        </div>

        <button class="gift-box-btn" onclick="showP('tasks', document.querySelectorAll('.nav-item')[1])">
            🎁 Daily Gift Tasks (Click Here)
        </button>

        <div class="tree-zone" onclick="handleTap(event)">
            <img id="tree-img" src="https://i.ibb.co.com/TBfn8G8M/27099-removebg-preview.png">
        </div>
    </div>

    <div id="tasks" class="page">
        <h2 style="color:var(--primary)">📋 Daily Tasks (24h)</h2>
        <div id="task-list"></div>
    </div>

    <div id="refer" class="page">
        <h2 style="color:var(--primary)">👥 Invite Friends</h2>
        <div style="background:white; padding:20px; border-radius:20px;">
            <input type="text" id="ref-link" readonly>
            <button class="btn btn-primary" style="width:100%; margin-top:15px" onclick="copyLink()">Copy Link</button>
        </div>
    </div>

    <div id="withdraw" class="page">
        <h2 style="color:var(--primary)">💰 Withdraw Money</h2>
        <div id="w-bal-show"></div>
        <div style="background:white; padding:20px; border-radius:20px; text-align:left">
            <select id="w-method" onchange="toggleMethod()">
                <option value="bkash">Bkash (Personal)</option>
                <option value="binance">Binance (BEP20)</option>
            </select>
            <p id="w-limit-text" style="color:var(--bkash); font-weight:bold; margin-top:10px">মিনিমাম ৯০,০০০ 🍒 = ২০ টাকা</p>
            <input type="number" id="w-amount" placeholder="Cherry Amount" oninput="calcW(this.value)">
            <input type="text" id="w-address" placeholder="বিকাশ নম্বর দিন" style="margin-top:10px">
            <button id="w-submit-btn" class="btn btn-bkash" style="width:100%; margin-top:20px" onclick="submitW()">Withdraw Now</button>
        </div>
    </div>

    <div id="support" class="page">
        <h2 style="color:var(--primary)">🎧 Support Center</h2>
        <div style="background:white; padding:10px; border-radius:20px">
            <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid #eee">
                <span>Admin Support</span>
                <button class="btn btn-grad-blue" onclick="window.open('https://t.me/PlumMineAdmin')">Chat</button>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:15px">
                <span>Payment Proof</span>
                <button class="btn btn-grad-blue" onclick="window.open('https://t.me/PlumMinePaymentProof')">Proof</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="showP('home', this)"><img src="https://cdn-icons-png.flaticon.com/512/619/619153.png">Home</div>
        <div class="nav-item" onclick="showP('tasks', this)"><img src="https://cdn-icons-png.flaticon.com/512/2645/2645827.png">Tasks</div>
        <div class="nav-item" onclick="showP('refer', this)"><img src="https://cdn-icons-png.flaticon.com/512/912/912318.png">Refer</div>
        <div class="nav-item" onclick="showP('withdraw', this)"><img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">Wallet</div>
        <div class="nav-item" onclick="showP('support', this)"><img src="https://cdn-icons-png.flaticon.com/512/4333/4333609.png">Support</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDE-YtDEDmxxJsNwya-RLRxVVWy5JJmsq4",
            authDomain: "plumminebot.firebaseapp.com",
            databaseURL: "https://plumminebot-default-rtdb.firebaseio.com",
            projectId: "plumminebot",
            appId: "1:876718225351:web:3fab78ff3ab25e9734cbe2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user || { id: 12345, first_name: "Guest" };
        const BOT_TOKEN = "8617357036:AAEs-Q1zfl36_6FdL3A8b12XE3TpTksxpKU";
        const ADMIN_ID = "7741833062";
        const SMART_LINK = "https://www.effectivegatecpm.com/eu58bq8h?key=ddafcd4b90ae80d8637cde448cec9d9c";

        let pts = 0, tps = 0;

        function showP(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(id === 'tasks') loadT();
            if(id === 'withdraw') updateWBal();
        }

        async function checkM() {
            try {
                const r = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getChatMember?chat_id=@HasiEarnigZone&user_id=${user.id}`);
                const d = await r.json();
                if(d.ok && ['member','administrator','creator'].includes(d.result.status)) {
                    document.body.style.display = "block";
                    initU();
                } else {
                    document.body.style.display = "block";
                    document.getElementById('f-join').style.display = "flex";
                }
            } catch(e) { document.body.style.display = "block"; initU(); }
        }

        function initU() {
            if(user.photo_url) document.getElementById('u-pic').src = user.photo_url;
            document.getElementById('ref-link').value = `https://t.me/PlumMineTap_bot?start=${user.id}`;
            db.ref('users/' + user.id).on('value', s => {
                const d = s.val();
                if(d) { pts = d.pts || 0; tps = d.tps || 0; updateUI(); }
                else { db.ref('users/' + user.id).set({ name: user.first_name, pts: 0, tps: 0 }); }
            });
        }

        function updateUI() {
            document.getElementById('bal').innerText = pts.toLocaleString();
            document.getElementById('tap-count').innerText = tps;
            document.getElementById('prog-fill').style.width = (tps / 50 * 100) + "%";
        }

        function handleTap(e) {
            if(tps < 50) { pts++; tps++; db.ref('users/' + user.id).update({ pts, tps }); }
            else { window.open(SMART_LINK, '_blank'); tps = 0; db.ref('users/' + user.id).update({ tps: 0 }); }
        }

        // --- Task Logic with 24h & Dynamic Colors ---
        function loadT() {
            const list = document.getElementById('task-list');
            list.innerHTML = "";
            db.ref('users/' + user.id + '/tasks').once('value', s => {
                const d = s.val() || {};
                const now = Date.now();
                for(let i=1; i<=10; i++) {
                    const lastClaim = d['t'+i] || 0;
                    const isDone = (now - lastClaim) < 86400000; // 24 Hours Logic

                    list.innerHTML += `<div style="background:white; padding:15px; margin:10px 0; border-radius:15px; display:flex; justify-content:space-between; align-items:center;">
                        <span>Task ${i} (10 🍒)</span>
                        <button class="btn ${isDone ? 'btn-done' : 'btn-primary'}" ${isDone ? 'disabled' : ''} onclick="goT(${i})">
                            ${isDone ? 'Completed' : 'Claim'}
                        </button>
                    </div>`;
                }
            });
        }

        function goT(id) {
            window.open(SMART_LINK, '_blank');
            pts += 10;
            db.ref('users/' + user.id).update({ pts });
            db.ref('users/' + user.id + '/tasks').update({ ['t'+id]: Date.now() });
            loadT();
        }

        // Withdraw functions kept same as index (7).html...
        function toggleMethod() {
            const m = document.getElementById('w-method').value;
            const l = document.getElementById('w-limit-text');
            const a = document.getElementById('w-address');
            const b = document.getElementById('w-submit-btn');
            if(m === 'bkash') {
                l.innerText = "মিনিমাম ৯০,০০০ 🍒 = ২০ টাকা"; l.style.color = "var(--bkash)";
                a.placeholder = "বিকাশ নম্বর দিন"; b.className = "btn btn-bkash";
            } else {
                l.innerText = "Minimum 5,000 🍒 = $0.0100"; l.style.color = "var(--binance)";
                a.placeholder = "Binance Address"; b.className = "btn btn-binance";
            }
        }

        function updateWBal() { document.getElementById('w-bal-show').innerHTML = `<div class="bal-card"><small>AVAILABLE</small><h1>${pts}</h1></div>`; }
        function copyLink() { const l = document.getElementById("ref-link"); l.select(); document.execCommand('copy'); tg.showAlert("Link Copied!"); }

        checkM();
        tg.expand();
    </script>
</body>
</html>
