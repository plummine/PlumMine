<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlumMine - 🧺 Official</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://pl28882912.effectivegatecpm.com/54/da/79/54da79f3dc63fac794c2e5433a1f8679.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #2e7d32; --accent: #8d6e63; --bkash: #e91e63; --binance: #f3ba2f; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e3f2fd; margin: 0; padding: 0; user-select: none; overflow: hidden; }
        .page { display: none; padding: 10px 15px 120px; height: 100vh; box-sizing: border-box; text-align: center; overflow-y: auto; }
        .active { display: block; }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: white; border-bottom: 1px solid #ddd; }
        #u-pic { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); background: #eee; }
        
        /* Dashboard Overlay Gifts - Navigation বারের উপরে */
        .gift-overlay { position: fixed; bottom: 85px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 2000; pointer-events: none; }
        .gift-box { pointer-events: auto; position: relative; cursor: pointer; transition: transform 0.2s; }
        .gift-box:active { transform: scale(0.9); }
        .badge { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; padding: 2px 7px; font-size: 10px; font-weight: bold; border: 1px solid white; }

        /* Balance Card */
        .bal-card { background: #fff9c4; border: 3px solid var(--accent); border-radius: 25px; width: 100%; padding: 15px; position: relative; text-align: left; box-sizing: border-box; margin-top: 10px; }
        .bal-card h1 { font-size: 35px; margin: 5px 0; color: #d84315; font-weight: 800; }
        .prog-bg { width: 100%; height: 8px; background: #eee; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        #prog-fill { height: 100%; width: 0%; background: var(--primary); transition: width 0.3s; }

        /* Game Zone - Tree */
        .game-zone { height: 40vh; display: flex; align-items: center; justify-content: center; position: relative; }
        #tree-img { width: 80%; max-width: 280px; z-index: 5; }
        .falling-plum { position: absolute; font-size: 28px; z-index: 4; pointer-events: none; animation: fallFromCenter 0.8s ease-in forwards; }
        
        @keyframes fallFromCenter { 
            0% { opacity: 1; transform: translate(-50%, 0); } 
            100% { opacity: 0; transform: translate(-50%, 200px); } 
        }

        /* Buttons */
        .btn { border: none; padding: 12px 20px; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-green { background: #4caf50; }
        .btn-grey { background: #aaa !important; cursor: not-allowed; }
        .btn-bkash { background: linear-gradient(45deg, #d81b60, #e91e63); }
        .btn-binance { background: linear-gradient(45deg, #f3ba2f, #f1b000); color: #000; }
        .btn-support { background: linear-gradient(45deg, #1976d2, #0288d1); width: 110px; }

        input, select { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        
        /* Navigation */
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; height: 75px; align-items: center; z-index: 1000; }
        .nav-item { text-align: center; font-size: 11px; color: #777; cursor: pointer; flex: 1; }
        .nav-item img { width: 24px; display: block; margin: 0 auto 4px; }
        .nav-item.active { color: #d84315; font-weight: bold; }
    </style>
</head>
<body style="display:none">

    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="u-pic" src="">
            <span style="font-weight:bold; color:var(--primary);">PlumMine🧺🍒</span>
        </div>
    </div>

    <div class="gift-overlay" id="gift-ui">
        <div class="gift-box" onclick="claimGift('green')">
            <img src="https://i.ibb.co.com/0RcvhqxK/27633-removebg-preview.png" width="55">
            <span id="gb" class="badge">0</span>
        </div>
        <div class="gift-box" onclick="claimGift('red')">
            <img src="https://i.ibb.co.com/8gxBtPpT/27630-removebg-preview.png" width="55">
            <span id="rb" class="badge">0</span>
        </div>
    </div>

    <div id="home" class="page active">
        <div class="bal-card">
            <small>TOTAL CHERRIES</small><h1 id="bal">0</h1>
            <div style="font-size:11px;">Tap Progress: <span id="tc">0</span>/50</div>
            <div class="prog-bg"><div id="prog-fill"></div></div>
            <img src="https://i.ibb.co.com/TDnYXwG1/27118-removebg-preview.png" style="position:absolute; right:15px; top:15px; width:70px;">
        </div>
        <div class="game-zone" id="gz" onclick="doTap(event)">
            <img id="tree-img" src="https://i.ibb.co.com/TBfn8G8M/27099-removebg-preview.png">
        </div>
    </div>

    <div id="tasks" class="page">
        <h2 style="color:var(--primary)">📋 Daily Tasks (24h)</h2>
        <div id="task-list"></div>
    </div>

    <div id="withdraw" class="page">
        <h2 style="color:var(--primary)">💰 Withdraw</h2>
        <div id="w-bal-show"></div>
        <div style="background:white; padding:20px; border-radius:20px; text-align:left">
            <select id="w-method" onchange="updateW()">
                <option value="bkash">Bkash (Personal)</option>
                <option value="binance">Binance (BEP20)</option>
            </select>
            <p id="w-limit" style="color:var(--bkash); font-weight:bold; margin-top:10px">মিনিমাম ৯০,০০০ 🍒 = ২০ টাকা</p>
            <input type="number" id="w-amt" placeholder="Amount" oninput="calcW(this.value)">
            <input type="text" id="w-adr" placeholder="বিকাশ নম্বর">
            <button id="w-btn" class="btn btn-bkash" style="width:100%; margin-top:20px" onclick="sendW()">Submit</button>
        </div>
    </div>

    <div id="support" class="page">
        <h2 style="color:var(--primary)">🎧 Support</h2>
        <div style="background:white; padding:15px; border-radius:20px">
            <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid #eee">
                <span>Admin Chat</span>
                <button class="btn btn-support" onclick="window.open('https://t.me/PlumMineAdmin')">@Admin</button>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; padding:10px">
                <span>Payment Proof</span>
                <button class="btn btn-support" onclick="window.open('https://t.me/PlumMinePaymentProof')">Proof</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="nav('home', this)"><img src="https://i.ibb.co.com/TDnYXwG1/27118-removebg-preview.png">Home</div>
        <div class="nav-item" onclick="nav('tasks', this)"><img src="https://cdn-icons-png.flaticon.com/512/2098/2098402.png">Tasks</div>
        <div class="nav-item" onclick="nav('withdraw', this)"><img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">Wallet</div>
        <div class="nav-item" onclick="nav('support', this)"><img src="https://cdn-icons-png.flaticon.com/512/4333/4333609.png">Support</div>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDE-YtDEDmxxJsNwya-RLRxVVWy5JJmsq4", authDomain: "plumminebot.firebaseapp.com", databaseURL: "https://plumminebot-default-rtdb.firebaseio.com", projectId: "plumminebot", appId: "1:876718225351:web:3fab78ff3ab25e9734cbe2" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user || { id: "Guest", first_name: "Player" };
        const BOT_TOKEN = "8617357036:AAEs-Q1zfl36_6FdL3A8b12XE3TpTksxpKU";
        const ADMIN_ID = "7741833062";
        const AD_LINK = "https://www.effectivegatecpm.com/eu58bq8h?key=ddafcd4b90ae80d8637cde448cec9d9c";

        let pts = 0, tps = 0, rc = 0, gc = 0;

        function loadData() {
            if(user.photo_url) document.getElementById('u-pic').src = user.photo_url;
            db.ref('users/' + user.id).on('value', snap => {
                const d = snap.val() || { pts:0, tps:0, rc:0, gc:0 };
                pts = d.pts; tps = d.tps; rc = d.rc; gc = d.gc;
                updateUI();
            });
        }

        function updateUI() {
            document.getElementById('bal').innerText = pts.toLocaleString();
            document.getElementById('tc').innerText = tps;
            document.getElementById('prog-fill').style.width = (tps/50)*100 + "%";
            document.getElementById('rb').innerText = rc;
            document.getElementById('gb').innerText = gc;
        }

        function doTap(e) {
            if(tps < 50) {
                pts++; tps++;
                if(pts % 500 === 0) { rc++; gc++; }
                db.ref('users/' + user.id).update({ pts, tps, rc, gc });
                
                // ফল গাছের মাঝখান থেকে পড়বে
                const f = document.createElement('div'); f.className = 'falling-plum'; f.innerText = '🍒';
                f.style.left = '50%'; f.style.top = '45%'; 
                document.getElementById('gz').appendChild(f);
                setTimeout(() => f.remove(), 800);
            } else {
                window.open(AD_LINK, '_blank');
                tps = 0; db.ref('users/' + user.id).update({ tps: 0 });
            }
        }

        function claimGift(type) {
            window.open(AD_LINK, '_blank');
            if(type === 'red' && rc > 0) { pts += 5; rc--; } 
            else if(type === 'green' && gc > 0) { pts += 2; gc--; }
            db.ref('users/' + user.id).update({ pts, rc, gc });
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
            
            // ড্যাশবোর্ডের গিফট শুধু হোম পেজে থাকবে
            document.getElementById('gift-ui').style.display = (id === 'home') ? 'flex' : 'none';
            
            if(id === 'tasks') renderT();
            if(id === 'withdraw') updateWBal();
        }

        function renderT() {
            const list = document.getElementById('task-list'); list.innerHTML = '';
            db.ref('users/' + user.id + '/tasks').once('value', snap => {
                const td = snap.val() || {};
                for(let i=1; i<=10; i++) {
                    const isDone = (Date.now() - (td['t'+i] || 0)) < 86400000;
                    list.innerHTML += `<div style="background:white; padding:15px; margin:10px 0; border-radius:15px; display:flex; justify-content:space-between; align-items:center;">
                        <span>Task ${i} (10 🍒)</span>
                        <button class="btn ${isDone ? 'btn-grey' : 'btn-green'}" ${isDone ? 'disabled' : ''} onclick="goT(${i})">
                            ${isDone ? 'Completed' : 'Claim'}
                        </button>
                    </div>`;
                }
            });
        }

        function goT(id) {
            window.open(AD_LINK, '_blank');
            pts += 10;
            db.ref('users/' + user.id).update({ pts });
            db.ref('users/' + user.id + '/tasks').update({ ['t'+id]: Date.now() });
            renderT();
        }

        function updateW() {
            const m = document.getElementById('w-method').value;
            const l = document.getElementById('w-limit');
            const ad = document.getElementById('w-adr');
            const btn = document.getElementById('w-btn');
            if(m === 'bkash') {
                l.innerText = "মিনিমাম ৯০,০০০ 🍒 = ২০ টাকা"; l.style.color = "var(--bkash)";
                ad.placeholder = "বিকাশ নম্বর"; btn.className = "btn btn-bkash";
            } else {
                l.innerText = "Min 5,000 🍒 = $0.0100"; l.style.color = "var(--binance)";
                ad.placeholder = "Binance Address"; btn.className = "btn btn-binance";
            }
        }

        function sendW() {
            const m = document.getElementById('w-method').value;
            const a = parseInt(document.getElementById('w-amt').value);
            const adr = document.getElementById('w-adr').value;
            const min = m === 'bkash' ? 90000 : 5000;
            if(a >= min && pts >= a && adr) {
                const val = m === 'bkash' ? "৳"+((a/90000)*20).toFixed(2) : "$"+((a/5000)*0.01).toFixed(4);
                const txt = `💰 Withdraw Request\nUser: ${user.first_name}\nAmt: ${a}\nMethod: ${m}\nAddr: ${adr}\nValue: ${val}`;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(txt)}`);
                pts -= a; db.ref('users/' + user.id).update({ pts });
                tg.showAlert("Success!");
            } else { tg.showAlert("Error!"); }
        }

        function updateWBal() { document.getElementById('w-bal-show').innerHTML = `<div class="bal-card"><h1>${pts}</h1></div>`; }

        document.body.style.display = "block";
        loadData();
        tg.expand();
    </script>
</body>
</html>
