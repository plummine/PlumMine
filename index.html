    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let points = parseInt(localStorage.getItem('p_bal')) || 0;
        let taps = 0;
        const directAdLink = "https://www.effectivegatecpm.com/eu58bq8h?key=ddafcd4b90ae80d8637cde448cec9d9c";

        function update() {
            document.getElementById('bal').innerText = points.toLocaleString();
            document.getElementById('w-bal').innerText = points.toLocaleString();
            document.getElementById('tc').innerText = taps;
            document.getElementById('fill').style.width = (taps / 50) * 100 + "%";
            localStorage.setItem('p_bal', points);
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }

        function doTap() {
            if (taps < 50) {
                points++; 
                taps++; 
                update();
                
                const p = document.createElement('div');
                p.className = 'plum-fall'; p.innerText = "🍒";
                p.style.left = Math.random() * 60 + 20 + "%";
                p.style.top = "50px";
                document.getElementById('p-area').appendChild(p);
                setTimeout(() => p.remove(), 700);
            } else {
                const randomChoice = Math.random();
                if (randomChoice > 0.5 && typeof mndint !== 'undefined') {
                    mndint.show();
                } else {
                    window.open(directAdLink, '_blank');
                }
                taps = 0;
                update();
            }
        }

        // --- টাস্ক সিস্টেম (২৪ ঘণ্টা লজিক) ---
        const taskDiv = document.getElementById('task-list');
        
        function renderTasks() {
            taskDiv.innerHTML = '';
            const now = new Date().getTime();

            for(let i=1; i<=10; i++){
                const lastClaim = localStorage.getItem(`task_${i}_time`);
                const isCompleted = lastClaim && (now - lastClaim < 24 * 60 * 60 * 1000);

                taskDiv.innerHTML += `
                    <div class="card">
                        <span>Task ${i}: Get 10 🍒</span>
                        <button class="btn" id="btn_${i}" 
                            ${isCompleted ? 'disabled style="background:#ccc"' : ''} 
                            onclick="goTask(${i})">
                            ${isCompleted ? 'Completed' : 'Claim'}
                        </button>
                    </div>`;
            }
        }

        function goTask(id) {
            const now = new Date().getTime();
            
            // অ্যাড ওপেন করা
            window.open(directAdLink, '_blank');
            
            // রিওয়ার্ড দেওয়া ও টাইম সেভ করা
            points += 10;
            localStorage.setItem(`task_${id}_time`, now);
            
            update();
            renderTasks(); // বাটন আপডেট করা
            tg.showAlert("টাস্ক সফল! ১০টি বড়ই যুক্ত হয়েছে। ২৪ ঘণ্টা পর আবার আসবে।");
        }

        function checkW() {
            if(points < 5000) tg.showAlert("মিনিমাম ৫০০০ বড়ই লাগবে।");
            else tg.showAlert("রিকোয়েস্ট সফল! অ্যাডমিন ২৪ ঘণ্টার মধ্যে চেক করবেন।");
        }

        function copyRef() {
            navigator.clipboard.writeText(document.getElementById('ref-link').innerText);
            tg.showAlert("লিঙ্ক কপি হয়েছে!");
        }

        if (tg.initDataUnsafe.user) {
            const u = tg.initDataUnsafe.user;
            document.getElementById('ref-link').innerText = `https://t.me/PlumMineTap_bot?start=${u.id}`;
        }

        update();
        renderTasks(); // শুরুতে টাস্কগুলো লোড করা
    </script>
