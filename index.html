<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlumMine 🧺🍒 Official</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #2e7d32; --accent: #d84315; --bg: #f4f7f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; user-select: none; overflow: hidden; height: 100vh; }
        
        #loading-screen, #verify-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; padding: 20px; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .app-container { display: none; height: 100vh; width: 100%; flex-direction: column; position: relative; }
        .content-area { flex-grow: 1; overflow-y: auto; padding-bottom: 120px; }
        
        .bot-name-3d { font-size: 36px; font-weight: 900; color: #2e7d32; text-shadow: 2px 2px 0px #fff, 5px 5px 0px #d84315; margin: 15px 0; text-align: center; }
        .balance-card { background: white; margin: 0 20px 10px; padding: 20px; border-radius: 30px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        .balance-card h2 { font-size: 40px; margin: 5px 0; color: var(--accent); }
        .progress-line { width: 100%; height: 12px; background: #eee; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; width: 0%; background: var(--primary); transition: 0.3s; }

        .tree-section { display: flex; flex-direction: column; align-items: center; position: relative; min-height: 330px; margin-top: 10px; }
        .tree-container { width: 220px; cursor: pointer; transition: transform 0.1s; z-index: 5; margin-bottom: 50px; }
        .tree-container:active { transform: scale(0.92); }
        .tree-img { width: 100%; }

        .box-sidebar { position: absolute; bottom: -15px; width: 100%; display: flex; justify-content: space-around; padding: 0 10px; z-index: 10; }
        .box-item { width: 85px; text-align: center; cursor: pointer; position: relative; background: rgba(255,255,255,0.7); border-radius: 15px; padding: 5px; }
        .box-badge { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; padding: 2px 8px; font-size: 13px; font-weight: bold; border: 2px solid white; }

        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        .card { background: white; padding: 18px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #f0f0f0; }

        .btn-action { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-banner { background: linear-gradient(135deg, #FF5722, #FF9800); padding: 25px; font-size: 18px; box-shadow: 0 5px 15px rgba(255,87,34,0.3); border-radius: 20px; border: none; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { color: #888; text-decoration: none; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        .cherry-drop { position: absolute; font-size: 25px; pointer-events: none; animation: drop 0.7s ease-in forwards; z-index: 100; }
        @keyframes drop { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(250px) rotate(360deg); opacity: 0; } }
        
        @keyframes pulse-banner { 0% { transform: scale(0.95); opacity: 0.9; } 70% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.9; } }
        
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; }
        th { background: var(--primary); color: white; padding: 12px; font-size: 14px; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="spinner"></div><p>PlumMine Loading...</p></div>

    <div id="verify-screen" style="display:none;">
        <div class="card">
            <h2 style="color:red;">Join Required! 🍒</h2>
            <button onclick="tg.openTelegramLink('https://t.me/HasiEarnigZone')" class="btn-action" style="background:#24A1DE;"><i class="fab fa-telegram-plane"></i> Join Channel</button>
            <button onclick="tg.openTelegramLink('https://t.me/taskcashpro_official_bot?start=r03512472386')" class="btn-action" style="background:#24A1DE;"><i class="fas fa-robot"></i> Join Bot</button>
            <button onclick="realVerifyCheck()" class="btn-action">VERIFY NOW ✅</button>
        </div>
    </div>

    <div id="main-app" class="app-container">
        <div class="content-area">
            <div id="home" class="page active">
                <h1 class="bot-name-3d">PlumMine</h1>
                <div class="balance-card">
                    <h2 id="total-bal">0 🍒</h2>
                    <div id="usd-bal" style="color: #666; font-weight: bold;">$0.0000 | 0.00 BDT</div>
                    <div class="progress-line"><div id="p-fill" class="progress-fill"></div></div>
                    <small id="p-count">0 / 50 Taps</small>
                </div>
                <div class="tree-section">
                    <div class="tree-container" onclick="handleTap(event)">
                        <img src="https://i.ibb.co.com/TBfn8G8M/27099-removebg-preview.png" class="tree-img">
                    </div>
                    <div class="box-sidebar">
                        <div class="box-item" onclick="claimBox('red')">
                            <img src="https://i.ibb.co.com/8gxBtPpT/27630-removebg-preview.png" style="width:100%;">
                            <span id="r-count" class="box-badge">0</span>
                        </div>
                        <div class="box-item" onclick="claimBox('green')">
                            <img src="https://i.ibb.co.com/0RcvhqxK/27633-removebg-preview.png" style="width:100%;">
                            <span id="g-count" class="box-badge">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tasks" class="page"><h3>Daily Tasks 📋</h3><div id="task-list"></div></div>

            <div id="refer" class="page">
                <div class="card" style="text-align:center;">
                    <p>প্রতি সফল রেফারে ৫০০ 🍒</p>
                    <input type="text" id="ref-link" readonly style="width:100%; padding:12px; text-align:center; border:1px solid #ddd; border-radius:12px; margin-bottom:12px;">
                    <button onclick="copyRef()" class="btn-action">Copy Link</button>
                </div>
                <h4>Referral History</h4>
                <div class="table-container"><table><thead><tr><th>Name</th><th>Status</th></tr></thead><tbody id="ref-data"></tbody></table></div>
            </div>

            <div id="withdraw" class="page">
                <div class="balance-card"><h2 id="w-bal">0 🍒</h2></div>
                <div class="card">
                    <select id="w-method" class="btn-action" style="background:#fff; color:#333; border:1px solid #ddd;" onchange="updateWCalc()">
                        <option value="Bkash">Bkash (Min: 10000)</option>
                        <option value="Nagad">Nagad (Min: 10000)</option>
                        <option value="Binance">Binance (Min: 10000)</option>
                    </select>
                    <input type="number" id="w-amt" placeholder="Min 10000 🍒" class="btn-action" style="background:#fff; color:#333; border:1px solid #ddd;" oninput="updateWCalc()">
                    <div id="w-calc-live" style="text-align:right; font-weight:bold; color:var(--accent);">Receive: 0.00 BDT</div>
                    <input type="text" id="w-addr" placeholder="Address/Number" class="btn-action" style="background:#fff; color:#333; border:1px solid #ddd;">
                    <button onclick="submitW()" class="btn-action">SUBMIT</button>
                </div>
                <h4>Withdraw History</h4>
                <div class="table-container"><table><thead><tr><th>Date</th><th>Amount</th><th>Status</th></tr></thead><tbody id="w-history"></tbody></table></div>
            </div>

            <div id="support" class="page">
                <div class="card" style="text-align:center; border:none; background:transparent;">
                    <img src="https://i.ibb.co.com/xTkFZkM/28204.jpg" style="width: 100%; border-radius: 20px; margin-bottom:15px;">
                    <button onclick="tg.openTelegramLink('https://t.me/PlumMineAdmin')" class="btn-action" style="background:#d84315;">Contact Admin</button>
                    <button onclick="tg.openTelegramLink('https://t.me/HasiEarnigZone')" class="btn-action" style="background:#24A1DE;">Official Channel</button>
                    <button onclick="tg.openTelegramLink('https://t.me/TaskCashPro')" class="btn-action btn-banner">
                        <span style="color:white; font-weight:bold; font-size:18px;">অন্যান্য ইনকাম টিপস গ্রুপ</span>
                        <span style="background:white; color:#FF5722; padding:5px 20px; border-radius:50px; font-size:14px; font-weight:900; margin-top:8px; animation: pulse-banner 1.5s infinite; display: inline-block;">CLICK NOW</span>
                    </button>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <a href="javascript:void(0)" class="nav-item active" onclick="showPage('home', this)"><i class="fas fa-home"></i>Home</a>
            <a href="javascript:void(0)" class="nav-item" onclick="showPage('tasks', this)"><i class="fas fa-tasks"></i>Task</a>
            <a href="javascript:void(0)" class="nav-item" onclick="showPage('refer', this)"><i class="fas fa-users"></i>Refer</a>
            <a href="javascript:void(0)" class="nav-item" onclick="showPage('withdraw', this)"><i class="fas fa-wallet"></i>Wallet</a>
            <a href="javascript:void(0)" class="nav-item" onclick="showPage('support', this)"><i class="fas fa-headset"></i>Support</a>
        </nav>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user || { id: "7613003641", first_name: "Miner" };
        const botToken = "8617357036:AAEs-Q1zfl36_6FdL3A8b12XE3TpTksxpKU"; 
        const adminId = "7741833062";
        const proofGroup = "@PlumMinePaymentProof";

        const firebaseConfig = { databaseURL: "https://plummine-tap-project-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let score = 0, rb = 0, gb = 0, taps = 0;

        async function fullCheckJoin() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${botToken}/getChatMember?chat_id=@HasiEarnigZone&user_id=${user.id}`);
                const data = await res.json();
                if (data.ok && ['member','administrator','creator'].includes(data.result.status)) {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('verify-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'flex';
                    initApp();
                } else {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('verify-screen').style.display = 'flex';
                }
            } catch (e) { console.log("Network error"); }
        }
        
        fullCheckJoin();

        function initApp() {
            document.getElementById('ref-link').value = `https://t.me/PlumMineTap_bot?start=${user.id}`;
            db.ref('users/' + user.id).on('value', snap => {
                const d = snap.val() || { pts: 0, rb: 0, gb: 0 };
                score = d.pts; rb = d.rb; gb = d.gb;
                updateDisplay();
                loadWithdrawHistory();
                loadReferHistory();
                renderTasks();
            });
            checkReferralAfterVerify();
        }

        function handleTap(e) {
            score++; taps++;
            const drop = document.createElement('div'); drop.className = 'cherry-drop'; drop.innerText = '🍒';
            drop.style.left = (e.clientX - 15) + 'px'; drop.style.top = (e.clientY - 30) + 'px';
            document.body.appendChild(drop);
            setTimeout(() => drop.remove(), 700);
            if(taps >= 50) { taps = 0; tg.openLink("https://www.effectivegatecpm.com/hxm4wpfp4?key=53227d2b29be87d8351178c6412882f3"); }
            if(score % 100 === 0) rb++; if(score % 1000 === 0) gb++;
            updateDisplay();
            db.ref('users/' + user.id).update({ pts: score, rb, gb });
        }

        function claimBox(type) {
            tg.openLink("https://www.effectivegatecpm.com/b1hixejydi?key=d536c017bbfff7dc4cca0099e085f5a4");
            if(type === 'red' && rb > 0) { score += 50; rb--; }
            else if(type === 'green' && gb > 0) { score += 200; gb--; }
            db.ref('users/' + user.id).update({ pts: score, rb, gb });
        }

        function updateDisplay() {
            document.getElementById('total-bal').innerText = score + " 🍒";
            document.getElementById('w-bal').innerText = score + " 🍒";
            document.getElementById('r-count').innerText = rb;
            document.getElementById('g-count').innerText = gb;
            document.getElementById('p-fill').style.width = (taps/50)*100 + "%";
            document.getElementById('p-count').innerText = taps + " / 50 Taps";
            document.getElementById('usd-bal').innerText = `$${(score/120000).toFixed(4)} | ${(score/1000).toFixed(2)} BDT`;
        }

        function updateWCalc() {
            const val = document.getElementById('w-amt').value || 0;
            const method = document.getElementById('w-method').value;
            // বাইনান্সের জন্য ১০০ টাকা রেট, অন্যদের জন্য ১০০০ চেরিতে ১ টাকা (বিকাশ/নগদ)
            let receive = (method === "Binance") ? (val / 1000) * 1.2 : (val / 1000); 
            // ইউজার চাইল বাইনান্স ১ ডলার ১০০ টাকা
            if(method === "Binance") {
                let dollar = (val / 10000); 
                document.getElementById('w-calc-live').innerText = `Receive: $${dollar.toFixed(2)} (${(dollar * 100).toFixed(2)} BDT)`;
            } else {
                document.getElementById('w-calc-live').innerText = `Receive: ${(val / 1000).toFixed(2)} BDT`;
            }
        }

        function submitW() {
            const amt = parseInt(document.getElementById('w-amt').value);
            const m = document.getElementById('w-method').value;
            const adr = document.getElementById('w-addr').value;
            const date = new Date().toLocaleDateString();

            if (isNaN(amt) || amt < 10000) { tg.showAlert("দুঃখিত! সর্বনিম্ন উইথড্র ১০,০০০ 🍒"); return; }

            if (score >= amt && adr.length > 5) {
                const adminMsg = `🏧 *New Request!*\n👤 User: ${user.first_name}\n💳 Method: ${m}\n💰 Amt: ${amt}\n📍 Adr: \`${adr}\`\n📅 Date: ${date}`;
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${adminId}&text=${encodeURIComponent(adminMsg)}&parse_mode=Markdown`);

                const groupMsg = `✅ *Withdrawal Successful!*\n👤 Miner: ${user.first_name}\n🍒 Amount: ${amt}\n💰 Method: ${m}\n💳 Target: ${adr}\n📅 Date: ${date}\nStatus: Paid Successfully ✅`;
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${proofGroup}&text=${encodeURIComponent(groupMsg)}&parse_mode=Markdown`);

                db.ref('users/' + user.id + '/w_history').push({ date, amt, status: "Paid" });
                score -= amt;
                db.ref('users/' + user.id).update({ pts: score });
                tg.showAlert("Success! ✅");
                document.getElementById('w-amt').value = ''; document.getElementById('w-addr').value = '';
            } else { tg.showAlert("Check balance or info!"); }
        }

        function renderTasks() {
            const list = document.getElementById('task-list'); list.innerHTML = '';
            const now = Date.now();
            db.ref('users/' + user.id + '/task_timers').once('value', snap => {
                const timers = snap.val() || {};
                for(let i=1; i<=10; i++) {
                    const isDone = (now - (timers[i] || 0)) < 86400000;
                    list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <span>Daily Task #${i} (+50 🍒)</span>
                        <button onclick="${isDone?'':'doTask('+i+')'}" style="background:${isDone?'#ccc':''}; min-width:80px;" class="btn-action">${isDone?'Done':'Start'}</button>
                    </div>`;
                }
            });
        }

        function doTask(id) {
            tg.openLink("https://www.effectivegatecpm.com/j367fw0d?key=276e1acc8810b4e8802bb57e85fd3450");
            setTimeout(() => {
                score += 50; db.ref('users/' + user.id).update({ pts: score });
                db.ref('users/' + user.id + '/task_timers/' + id).set(Date.now());
                renderTasks();
            }, 5000);
        }

        function loadWithdrawHistory() {
            db.ref('users/' + user.id + '/w_history').once('value', snap => {
                const tbody = document.getElementById('w-history');
                tbody.innerHTML = '';
                snap.forEach(child => {
                    const h = child.val();
                    tbody.innerHTML += `<tr><td>${h.date}</td><td>${h.amt} 🍒</td><td style="color: green; font-weight: bold;">${h.status}</td></tr>`;
                });
            });
        }

        function loadReferHistory() {
            db.ref('users').orderByChild('referredBy').equalTo(user.id.toString()).once('value', snap => {
                const tbody = document.getElementById('ref-data');
                tbody.innerHTML = '';
                snap.forEach(child => {
                    tbody.innerHTML += `<tr><td>${child.val().first_name || 'Miner'}</td><td style="color: #2e7d32;">Success ✅</td></tr>`;
                });
            });
        }

        function checkReferralAfterVerify() {
            const inviterId = tg.initDataUnsafe.start_param;
            if (inviterId && inviterId != user.id) {
                db.ref('users/' + user.id + '/bonus_done').once('value', snap => {
                    if (!snap.exists()) {
                        db.ref('users/' + inviterId + '/pts').transaction(p => (p || 0) + 500);
                        db.ref('users/' + user.id).update({ bonus_done: true, referredBy: inviterId, first_name: user.first_name });
                    }
                });
            }
        }

        function showPage(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        async function realVerifyCheck() { fullCheckJoin(); }
        function copyRef() { const el = document.getElementById('ref-link'); el.select(); document.execCommand('copy'); tg.showAlert("Copied!"); }
    </script>
</body>
</html>
