<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlumMine Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #1a5d1a; --secondary: #fce762; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f4f0; user-select: none; overflow: hidden; }
        .page { display: none; padding: 20px; height: 100vh; box-sizing: border-box; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        #plum-tree { width: 220px; transition: transform 0.1s; cursor: pointer; }
        #plum-tree:active { transform: scale(0.95); }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; padding-bottom: env(safe-area-inset-bottom); }
        .nav-link { flex: 1; text-align: center; padding: 15px 5px; font-size: 12px; color: #777; transition: 0.3s; }
        .active-nav { color: var(--primary); font-weight: bold; }
        #referral-list { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; }
        #referral-list li { padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; color: #444; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: var(--primary); margin: 0;">🧺 PlumMine</h2>
            <p id="user-name" style="margin: 5px 0; color: #666;"></p>
        </div>
        <div class="card" style="text-align: center;">
            <small>TOTAL BALANCE</small>
            <h1 style="margin: 5px 0; font-size: 36px; color: var(--primary);"><span id="bal">0</span> 🍒</h1>
            <p style="font-size: 14px; color: #888;">Taps: <span id="tc">0</span> / 500</p>
        </div>
        <div style="text-align: center; margin-top: 30px;">
            <img id="plum-tree" src="https://i.ibb.co/TByRn8G8M/27099-removebg-preview.png" onclick="doTap(event)">
        </div>
    </div>

    <div id="refer" class="page">
        <h2 style="color: var(--primary)">🤝 Refer & Earn</h2>
        <div class="card">
            <p style="font-size: 14px; color: #555;">Invite friends and get 500 🍒 for each!</p>
            <input type="text" id="ref-link" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;" readonly>
            <button class="btn" style="margin-top: 10px;" onclick="copyRef()">Copy Referral Link</button>
        </div>
        <div class="card">
            <h4>Your Referral List</h4>
            <ul id="referral-list"><li>Loading...</li></ul>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link active-nav" onclick="nav('home', this)">Home</div>
        <div class="nav-link" onclick="nav('refer', this)">Refer</div>
    </nav>

    <script>
        // আপনার ফায়ারবেস কনফিগারেশন আপডেট করা হয়েছে
        const firebaseConfig = {
            apiKey: "AIzaSyDE-YtDEDmxxJsNwya-RLRxVVWy5JJmsq4",
            authDomain: "plumminebot.firebaseapp.com",
            databaseURL: "https://plumminebot-default-rtdb.firebaseio.com",
            projectId: "plumminebot",
            appId: "1:876718225351:web:3fab78ff3ab25e9734cbe2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user || { id: "Guest", first_name: "User" };
        document.getElementById('user-name').innerText = "Hello, " + user.first_name;

        let points = 0;
        let taps = 0;

        const userRef = db.ref('users/' + user.id);

        userRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                points = data.points || 0;
                taps = data.taps || 0;
                updateUI();
                renderReferrals(data.referrals);
            } else {
                userRef.set({ name: user.first_name, points: 0, taps: 0 });
                checkReferral();
            }
        });

        function updateUI() {
            document.getElementById('bal').innerText = points.toLocaleString();
            document.getElementById('tc').innerText = taps;
            document.getElementById('ref-link').value = "https://t.me/PlumMineTap_Bot?start=" + user.id;
        }

        function doTap(event) {
            if (taps < 500) {
                points += 1;
                taps += 1;
                userRef.update({ points: points, taps: taps });
                tg.HapticFeedback.impactOccurred('medium');
            } else {
                tg.showAlert("Daily limit reached!");
            }
        }

        function checkReferral() {
            const urlParams = new URLSearchParams(window.location.search);
            const refBy = urlParams.get('start');
            if (refBy && refBy != user.id) {
                db.ref('users/' + refBy + '/points').transaction(p => (p || 0) + 500);
                db.ref('users/' + refBy + '/referrals/' + user.id).set(user.first_name);
            }
        }

        function renderReferrals(referrals) {
            const list = document.getElementById('referral-list');
            list.innerHTML = "";
            if (referrals) {
                Object.values(referrals).forEach(name => {
                    let li = document.createElement('li');
                    li.innerText = "👤 " + name;
                    list.appendChild(li);
                });
            } else {
                list.innerHTML = "<li>No referrals yet.</li>";
            }
        }

        function nav(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }

        function copyRef() {
            const linkField = document.getElementById('ref-link');
            linkField.select();
            document.execCommand('copy');
            tg.showScanQrPopup({ text: "Link Copied!" }); // Alternative feedback
            setTimeout(() => tg.closeScanQrPopup(), 1000);
        }

        tg.expand();
    </script>
</body>
</html>
