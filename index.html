<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlumMine - 🧺 Official</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://pl28882912.effectivegatecpm.com/54/da/79/54da79f3dc63fac794c2e5433a1f8679.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #2e7d32; --accent: #8d6e63; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e3f2fd; margin: 0; padding: 0; user-select: none; overflow: hidden; }
        .page { display: none; padding: 10px 15px 90px; height: 100vh; box-sizing: border-box; text-align: center; overflow-y: auto; }
        .active { display: block; }

        /* Header with Profile */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: white; border-bottom: 1px solid #ddd; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        #user-pic { width: 35px; height: 35px; border-radius: 50%; border: 2px solid var(--primary); }
        .game-name { font-weight: bold; color: var(--primary); font-size: 18px; }

        /* Gifts - Fixed above Nav Bar */
        .gift-container { position: fixed; bottom: 85px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; pointer-events: none; z-index: 2000; }
        .gift-box { pointer-events: auto; position: relative; cursor: pointer; }
        .gift-badge { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; padding: 2px 7px; font-size: 10px; font-weight: bold; border: 1.5px solid #fff; }

        /* Balance & Progress */
        .balance-container { background: #fff9c4; border: 3px solid var(--accent); border-radius: 25px; width: 100%; padding: 15px; position: relative; text-align: left; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 10px; }
        .balance-info h1 { font-size: 38px; margin: 5px 0; color: #d84315; font-weight: 800; }
        .basket-side { position: absolute; right: 10px; top: 10px; width: 75px; }
        .progress-line-bg { width: 100%; height: 8px; background: #e0e0e0; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(to right, #4caf50, #2e7d32); transition: width 0.3s; }

        /* Game Zone - Tree & Falling Animation */
        .game-zone { height: 45vh; display: flex; align-items: center; justify-content: center; position: relative; }
        #plum-tree { width: 80%; max-width: 300px; transition: transform 0.05s; z-index: 5; }
        .falling-plum { position: absolute; font-size: 30px; z-index: 4; pointer-events: none; animation: fall 0.8s linear forwards; }
        @keyframes fall { 0% { opacity: 1; transform: translateY(-20px); } 100% { opacity: 0; transform: translateY(200px); } }

        /* Tasks - Spacing */
        .task-card { background: white; padding: 15px; margin: 15px 0; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Support Design */
        .support-banner { background: linear-gradient(135deg, #0088cc, #005580); color: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .support-banner i { font-size: 40px; }
        .support-card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; text-align: left; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
        .support-card img { width: 40px; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; height: 75px; align-items: center; z-index: 1000; }
        .nav-link { text-align: center; font-size: 11px; color: #777; cursor: pointer; flex: 1; }
        .nav-link img { width: 24px; display: block; margin: 0 auto 4px; }
        .nav-link.active-nav { color: #d84315; font-weight: bold; }

        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <img id="user-pic" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
            <span class="game-name">PlumMine🧺🍒</span>
        </div>
    </div>

    <!-- Fixed Gift Boxes -->
    <div class="gift-container" id="gift-ui">
        <div class="gift-box" onclick="claimGift('green')">
            <img src="https://i.ibb.co.com/0RcvhqxK/27633-removebg-preview.png" width="50">
            <span id="gb" class="gift-badge">0</span>
        </div>
        <div class="gift-box" onclick="claimGift('red')">
            <img src="https://i.ibb.co.com/8gxBtPpT/27630-removebg-preview.png" width="50">
            <span id="rb" class="gift-badge">0</span>
        </div>
    </div>

    <div id="home" class="page active">
        <div class="balance-container">
            <small>TOTAL BALANCE</small><h1 id="bal">0</h1>
            <img class="basket-side" src="https://i.ibb.co.com/TDnYXwG1/27118-removebg-preview.png">
            <div style="display: flex; justify-content: space-between; font-size: 11px;">
                <span>Taps Progress</span>
                <span><span id="tc">0</span>/50</span>
            </div>
            <div class="progress-line-bg"><div id="progress-fill"></div></div>
        </div>
        <div class="game-zone" id="gz">
            <img id="plum-tree" src="https://i.ibb.co.com/TBfn8G8M/27099-removebg-preview.png" onmousedown="doTap(event)" ontouchstart="doTap(event)">
        </div>
    </div>

    <div id="tasks" class="page">
        <h2>📋 Daily Tasks</h2>
        <div id="task-list"></div>
    </div>

    <div id="refer" class="page">
        <h2>👥 Refer & Earn</h2>
        <div class="task-card" style="background:#fff9c4; border:2px dashed #d84315;">🎁 প্রতি সফল রেফারে পাবেন ৫০০ 🍒 বোনাস!</div>
        <div class="task-card" style="flex-direction: column; gap: 10px;">
            <input type="text" id="ref-link" readonly style="width:100%; padding:10px; border:1px solid #ccc; border-radius:8px;">
            <button class="btn" onclick="copyLink()">Copy Link</button>
        </div>
        <div style="text-align:left; padding: 10px;"><b>Referral List:</b><div id="ref-list"></div></div>
    </div>

    <div id="withdraw" class="page">
        <div id="w-bal-card"></div>
        <div class="task-card" style="flex-direction: column; gap:10px;">
            <select id="w-method" style="width:100%; padding:10px; border-radius:8px;">
                <option value="binance">Binance (Min 5,000)</option>
                <option value="bkash">Bkash (Min 90,000)</option>
            </select>
            <input type="number" id="w-amount" placeholder="🍒 Amount" style="width:100%; padding:10px;">
            <input type="text" id="w-address" placeholder="Address/Number" style="width:100%; padding:10px;">
            <button class="btn" onclick="submitWithdraw()">Withdraw</button>
        </div>
    </div>

    <div id="support" class="page">
        <div class="support-banner">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" width="60">
            <h3>Need Help?</h3>
            <p>Connect with our official community</p>
        </div>
        <div class="support-card" onclick="window.open('https://t.me/PlumMineAdmin')">
            <img src="https://cdn-icons-png.flaticon.com/512/906/906377.png">
            <div><b>Contact Admin</b><br><small>Get instant support</small></div>
        </div>
        <div class="support-card" onclick="window.open('https://t.me/HasiEarnigZone')">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
            <div><b>Official Channel</b><br><small>Join for updates</small></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link active-nav" onclick="nav('home', this)"><img src="https://i.ibb.co.com/TDnYXwG1/27118-removebg-preview.png">Home</div>
        <div class="nav-link" onclick="nav('tasks', this)"><img src="https://cdn-icons-png.flaticon.com/512/2098/2098402.png">Tasks</div>
        <div class="nav-link" onclick="referNav(this)"><img src="https://cdn-icons-png.flaticon.com/512/912/912318.png">Refer</div>
        <div class="nav-link" onclick="nav('withdraw', this)"><img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">Withdraw</div>
        <div class="nav-link" onclick="nav('support', this)"><img src="https://cdn-icons-png.flaticon.com/512/4333/4333609.png">Support</div>
    </nav>

    <script>
        const SMART_LINK = "https://www.effectivegatecpm.com/eu58bq8h?key=ddafcd4b90ae80d8637cde448cec9d9c";
        const firebaseConfig = { apiKey: "AIzaSyDE-YtDEDmxxJsNwya-RLRxVVWy5JJmsq4", authDomain: "plumminebot.firebaseapp.com", databaseURL: "https://plumminebot-default-rtdb.firebaseio.com", projectId: "plumminebot", appId: "1:876718225351:web:3fab78ff3ab25e9734cbe2" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user || { id: "Guest", first_name: "Player" };

        let pts = 0, tps = 0, rc = 0, gc = 0;

        function loadData() {
            if(user.photo_url) document.getElementById('user-pic').src = user.photo_url;
            db.ref('users/' + user.id).on('value', snap => {
                const d = snap.val() || { pts:0, tps:0, rc:0, gc:0 };
                pts = d.pts; tps = d.tps; rc = d.rc; gc = d.gc;
                updateUI();
            });
        }

        function updateUI() {
            document.getElementById('bal').innerText = pts.toLocaleString();
            document.getElementById('tc').innerText = tps;
            document.getElementById('progress-fill').style.width = (tps/50)*100 + "%";
            document.getElementById('rb').innerText = rc;
            document.getElementById('gb').innerText = gc;
            document.getElementById('gift-ui').style.display = document.getElementById('home').classList.contains('active') ? 'flex' : 'none';
        }

        function doTap(e) {
            e.preventDefault();
            if(tps < 50) {
                pts++; tps++;
                if(pts % 500 === 0) { rc++; gc++; }
                db.ref('users/' + user.id).update({ pts, tps, rc, gc });
                
                // Falling from tree area
                const f = document.createElement('div'); f.className = 'falling-plum'; f.innerText = '🍒';
                const tree = document.getElementById('plum-tree').getBoundingClientRect();
                f.style.left = (tree.left + Math.random() * tree.width) + 'px';
                f.style.top = (tree.top + 50) + 'px';
                document.getElementById('gz').appendChild(f);
                setTimeout(() => f.remove(), 800);
            } else {
                window.open(SMART_LINK, '_blank');
                tps = 0; db.ref('users/' + user.id).update({ tps: 0 });
            }
        }

        function claimGift(type) {
            window.open(SMART_LINK, '_blank');
            if(type === 'red' && rc > 0) { pts += 5; rc--; } 
            else if(type === 'green' && gc > 0) { pts += 2; gc--; }
            db.ref('users/' + user.id).update({ pts, rc, gc });
        }

        function renderTasks() {
            const list = document.getElementById('task-list'); list.innerHTML = '';
            db.ref('users/' + user.id + '/tasks').once('value', snap => {
                const td = snap.val() || {};
                for(let i=1; i<=10; i++) {
                    const last = td['t'+i] || 0;
                    const isDone = (Date.now() - last) < 86400000;
                    list.innerHTML += `<div class="task-card">
                        <span>Daily Task ${i} (10 🍒)</span>
                        <button class="btn" style="width:80px" ${isDone?'disabled':''} onclick="goTask(${i})">${isDone?'Done':'Claim'}</button>
                    </div>`;
                }
            });
        }

        function goTask(id) {
            window.open(SMART_LINK, '_blank');
            pts += 10;
            db.ref('users/' + user.id).update({ pts });
            db.ref('users/' + user.id + '/tasks').update({ ['t'+id]: Date.now() });
            renderTasks();
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-nav'));
            el.classList.add('active-nav');
            if(id === 'tasks') renderTasks();
            updateUI();
        }

        function referNav(el) {
            document.getElementById('ref-link').value = "https://t.me/PlumMineTap_bot?start=" + user.id;
            nav('refer', el);
        }

        function copyLink() {
            const copyText = document.getElementById("ref-link");
            copyText.select();
            document.execCommand("copy");
            tg.showAlert("Link Copied!");
        }

        loadData(); tg.expand();
    </script>
</body>
</html>
