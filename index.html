<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlumMine - 🧺 Official</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://pl28882912.effectivegatecpm.com/54/da/79/54da79f3dc63fac794c2e5433a1f8679.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --primary: #2e7d32; --accent: #8d6e63; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #e3f2fd; margin: 0; padding: 0; user-select: none; overflow: hidden; }
        .page { display: none; padding: 10px 15px 90px; height: 100vh; box-sizing: border-box; text-align: center; overflow-y: auto; }
        .active { display: block; }

        /* Floating Gift Box - Home Only Logic */
        .gift-box { position: fixed; bottom: 85px; z-index: 2000; cursor: pointer; animation: floatAnim 3s infinite ease-in-out; display: none; }
        .red-gift { right: 20px; } .green-gift { left: 20px; }
        .gift-badge { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; padding: 2px 7px; font-size: 10px; font-weight: bold; border: 1.5px solid #fff; }
        @keyframes floatAnim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* Balance Card */
        .balance-container { background: #fff9c4; border: 3px solid var(--accent); border-radius: 25px; width: 100%; padding: 15px; position: relative; text-align: left; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .balance-info h1 { font-size: 40px; margin: 5px 0; color: #d84315; font-weight: 800; }
        .basket-side { position: absolute; right: 10px; top: 10px; width: 80px; }

        /* Game Zone & Falling Fruit */
        .game-zone { height: 40vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        #plum-tree { width: 75%; max-width: 280px; transition: transform 0.05s; z-index: 5; }
        .falling-plum { position: absolute; font-size: 25px; z-index: 10; pointer-events: none; animation: fall 0.7s linear forwards; }
        @keyframes fall { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(200px); opacity: 0; } }

        /* Cards & Buttons */
        .card { background: white; padding: 15px; margin: 10px 0; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:disabled { background: #ccc; }

        /* Table Style */
        .w-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .w-table th, .w-table td { border-bottom: 1px solid #eee; padding: 8px 4px; text-align: center; }

        /* Support Cards */
        .support-card { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border: 2px solid #81c784; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; text-align: left; }
        .support-icon { width: 45px; }

        /* Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; height: 75px; align-items: center; z-index: 1000; }
        .nav-link { text-align: center; font-size: 11px; color: #777; cursor: pointer; flex: 1; }
        .nav-link img { width: 24px; display: block; margin: 0 auto 4px; }
        .nav-link.active-nav { color: #d84315; font-weight: bold; }
    </style>
</head>
<body>

    <div id="red-gift-box" class="gift-box red-gift"><img src="https://i.ibb.co.com/8gxBtPpT/27630-removebg-preview.png" width="55" onclick="claimGift('red')"><span id="rb" class="gift-badge">0</span></div>
    <div id="green-gift-box" class="gift-box green-gift"><img src="https://i.ibb.co.com/0RcvhqxK/27633-removebg-preview.png" width="55" onclick="claimGift('green')"><span id="gb" class="gift-badge">0</span></div>

    <div id="home" class="page active">
        <div class="balance-container">
            <small>TOTAL BALANCE</small><h1 id="bal">0</h1>
            <img class="basket-side" src="https://i.ibb.co.com/TDnYXwG1/27118-removebg-preview.png">
            <div style="font-size:11px;">Tap Progress: <span id="tc">0</span>/50</div>
        </div>
        <div class="game-zone" id="gz" onclick="doTap(event)"><img id="plum-tree" src="https://i.ibb.co.com/TBfn8G8M/27099-removebg-preview.png"></div>
    </div>

    <div id="tasks" class="page">
        <h2>📋 Daily Tasks (24h)</h2>
        <div id="task-list"></div>
    </div>

    <div id="refer" class="page">
        <h2>👥 Refer & Earn</h2>
        <div class="card" style="background:gold">🎁 প্রতি রেফারে ৫০০ 🍒 বোনাস!</div>
        <div class="card"><input type="text" id="ref-link" readonly style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;"><button class="btn" style="margin-top:10px" onclick="copyLink()">Copy Link</button></div>
        <div class="card" style="text-align:left"><h4>Referral List:</h4><div id="ref-list"></div></div>
    </div>

    <div id="withdraw" class="page">
        <div id="w-bal-card"></div>
        <div class="card">
            <select id="w-method" style="width:100%; padding:10px; margin-bottom:10px;"><option value="binance">Binance (Min 5,000)</option><option value="bkash">Bkash (Min 90,000)</option></select>
            <input type="number" id="w-amount" placeholder="🍒 Amount" style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="text" id="w-address" placeholder="Address/Number" style="width:100%; padding:10px; margin-bottom:10px;">
            <button class="btn" onclick="submitWithdraw()">Submit Request</button>
        </div>
        <div class="card"><h4>📜 History</h4><table class="w-table"><thead><tr><th>Date</th><th>🍒</th><th>Method</th><th>Status</th></tr></thead><tbody id="h-body"></tbody></table></div>
    </div>

    <div id="support" class="page">
        <div class="support-card" onclick="window.open('https://t.me/PlumMineAdmin')"><img src="https://cdn-icons-png.flaticon.com/512/3703/3703259.png" class="support-icon"><div><b>Admin Chat</b><br><small>Support 24/7</small></div></div>
        <div class="support-card" onclick="window.open('https://t.me/HasiEarnigZone')"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png" class="support-icon"><div><b>Official Channel</b><br><small>Get Updates</small></div></div>
        <div class="support-card" onclick="window.open('https://t.me/PlumMinePaymentProof')"><img src="https://cdn-icons-png.flaticon.com/512/1019/1019607.png" class="support-icon"><div><b>Payment Proof</b><br><small>See Transactions</small></div></div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-link active-nav" onclick="nav('home', this)"><img src="https://i.ibb.co.com/TDnYXwG1/27118-removebg-preview.png">Home</div>
        <div class="nav-link" onclick="nav('tasks', this)"><img src="https://cdn-icons-png.flaticon.com/512/2098/2098402.png">Tasks</div>
        <div class="nav-link" onclick="nav('refer', this)"><img src="https://cdn-icons-png.flaticon.com/512/912/912318.png">Refer</div>
        <div class="nav-link" onclick="nav('withdraw', this)"><img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">Withdraw</div>
        <div class="nav-link" onclick="nav('support', this)"><img src="https://cdn-icons-png.flaticon.com/512/4333/4333609.png">Support</div>
    </nav>

    <script>
        const SMART_LINK = "https://www.effectivegatecpm.com/eu58bq8h?key=ddafcd4b90ae80d8637cde448cec9d9c";
        const firebaseConfig = { apiKey: "AIzaSyDE-YtDEDmxxJsNwya-RLRxVVWy5JJmsq4", authDomain: "plumminebot.firebaseapp.com", databaseURL: "https://plumminebot-default-rtdb.firebaseio.com", projectId: "plumminebot", appId: "1:876718225351:web:3fab78ff3ab25e9734cbe2" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe.user || { id: "Guest", first_name: "User" };

        let pts = 0, tps = 0, rc = 0, gc = 0;

        function loadData() {
            db.ref('users/' + user.id).on('value', snap => {
                const d = snap.val() || {};
                pts = d.pts || 0; tps = d.tps || 0; rc = d.rc || 0; gc = d.gc || 0;
                updateUI();
            });
            loadHistory(); loadRefs();
        }

        function updateUI() {
            document.getElementById('bal').innerText = pts.toLocaleString();
            document.getElementById('tc').innerText = tps;
            document.getElementById('rb').innerText = rc;
            document.getElementById('gb').innerText = gc;
            document.querySelectorAll('.gift-box').forEach(b => b.style.display = (document.getElementById('home').classList.contains('active')) ? 'block' : 'none');
            document.getElementById('red-gift-box').style.visibility = rc > 0 ? 'visible' : 'hidden';
            document.getElementById('green-gift-box').style.visibility = gc > 0 ? 'visible' : 'hidden';
        }

        function doTap(e) {
            if(tps < 50) {
                pts++; tps++;
                if(pts % 500 === 0) { rc++; gc++; }
                db.ref('users/' + user.id).update({ pts, tps, rc, gc });
                showFruit(e);
            } else {
                window.open(SMART_LINK, '_blank');
                tps = 0; db.ref('users/' + user.id).update({ tps: 0 });
            }
        }

        function showFruit(e) {
            const f = document.createElement('div'); f.className = 'falling-plum'; f.innerText = '🍒';
            f.style.left = e.clientX + 'px'; f.style.top = e.clientY + 'px';
            document.getElementById('gz').appendChild(f);
            setTimeout(() => f.remove(), 700);
        }

        function claimGift(t) {
            window.open(SMART_LINK, '_blank');
            if(t === 'red') { pts += 5; rc--; } else { pts += 2; gc--; }
            db.ref('users/' + user.id).update({ pts, rc, gc });
        }

        function renderTasks() {
            const list = document.getElementById('task-list'); list.innerHTML = '';
            db.ref('users/' + user.id + '/tasks').once('value', snap => {
                const td = snap.val() || {};
                for(let i=1; i<=10; i++) {
                    const last = td['t'+i] || 0;
                    const isDone = (Date.now() - last) < 86400000;
                    list.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <span>Task ${i} (10 🍒)</span>
                        <button class="btn" style="width:80px" ${isDone?'disabled':''} onclick="goTask(${i})">${isDone?'Done':'Claim'}</button>
                    </div>`;
                }
            });
        }

        function goTask(id) {
            window.open(SMART_LINK, '_blank');
            pts += 10;
            db.ref('users/' + user.id).update({ pts });
            db.ref('users/' + user.id + '/tasks').update({ ['t'+id]: Date.now() });
            renderTasks();
        }

        function submitWithdraw() {
            const m = document.getElementById('w-method').value;
            const a = parseInt(document.getElementById('w-amount').value);
            const ad = document.getElementById('w-address').value;
            const min = m === 'bkash' ? 90000 : 5000;
            if(a >= min && pts >= a && ad) {
                const h = { date: new Date().toLocaleDateString(), pts: a, method: m, status: 'Pending', addr: ad };
                db.ref('users/' + user.id + '/history').push(h);
                pts -= a; db.ref('users/' + user.id).update({ pts });
                tg.showAlert("Request Sent!");
            } else { tg.showAlert("Insufficient points or wrong input!"); }
        }

        function loadHistory() {
            db.ref('users/' + user.id + '/history').on('value', snap => {
                const b = document.getElementById('h-body'); b.innerHTML = '';
                const d = snap.val(); if(d) Object.values(d).reverse().forEach(x => {
                    b.innerHTML += `<tr><td>${x.date}</td><td>${x.pts}</td><td>${x.method}</td><td>${x.status}</td></tr>`;
                });
            });
        }

        function loadRefs() {
            db.ref('users/' + user.id + '/referrals').on('value', snap => {
                const b = document.getElementById('ref-list'); b.innerHTML = '';
                const d = snap.val(); if(d) Object.values(d).forEach((name, i) => {
                    b.innerHTML += `<div>${i+1}. 👤 ${name}</div>`;
                }); else b.innerHTML = 'No referrals yet.';
            });
        }

        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active-nav'));
            el.classList.add('active-nav');
            if(id === 'tasks') renderTasks();
            if(id === 'withdraw') document.getElementById('w-bal-card').innerHTML = `<div class="balance-container"><small>BALANCE</small><h1>${pts.toLocaleString()}</h1></div>`;
            updateUI();
        }

        function copyLink() {
            document.getElementById('ref-link').value = `https://t.me/PlumMineTap_bot?start=${user.id}`;
            const c = document.getElementById('ref-link'); c.select(); document.execCommand('copy');
            tg.showAlert("Link Copied!");
        }

        loadData(); tg.expand();
    </script>
</body>
</html>
